name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: |
          Welcome to OpenSquilla, and thanks for opening your first issue!
          To help us diagnose or discuss it efficiently, please include:
          - What you were trying to do
          - What actually happened
          - Relevant logs, environment details, or minimal reproduction steps
        pr-message: |
          Welcome to OpenSquilla, and thanks for your first pull request!
          CI will run automatically. If any checks fail, feel free to push fixes or ask questions in a comment.
